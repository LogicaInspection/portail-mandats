<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GEQ &ndash; Suivi de projets</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1724;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-card {
      background: #1a2332;
      border: 1px solid #2a3a52;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
    }
    .logo { text-align: center; margin-bottom: 32px; }
    label { display: block; font-size: 13px; font-weight: 500; color: #94a3b8; margin-bottom: 6px; }
    input {
      width: 100%; padding: 11px 14px;
      background: #0f1724; border: 1px solid #2a3a52;
      border-radius: 8px; color: #ffffff; font-size: 14px;
      margin-bottom: 16px; outline: none;
    }
    input:focus { border-color: #378add; }
    input::placeholder { color: #3a4a5c; }
    .btn {
      width: 100%; padding: 12px;
      background: #378add; color: white;
      font-size: 15px; font-weight: 600;
      border: none; border-radius: 8px; cursor: pointer;
    }
    .btn:hover { background: #2d6fb5; }
    .btn:disabled { background: #2a3a52; color: #64748b; cursor: not-allowed; }
    .error-msg {
      background: #2d1515; border: 1px solid #5c2020;
      color: #f87171; padding: 10px 14px;
      border-radius: 8px; font-size: 13px;
      margin-bottom: 16px; display: none;
    }
    .loading { display: none; text-align: center; color: #64748b; font-size: 13px; margin-top: 12px; }
    .footer-note { text-align: center; font-size: 12px; color: #3a4a5c; margin-top: 24px; }
    .toggle-pwd {
      font-size: 12px; color: #3a4a5c; cursor: pointer;
      margin: -10px 0 16px; display: flex; align-items: center; gap: 5px;
      user-select: none;
    }
    .toggle-pwd:hover { color: #5ba8f0; }
  </style>
</head>
<body>
<div class="login-card">
  <div class="logo">
    <img src="https://mosgioiumzsewbzsydeh.supabase.co/storage/v1/object/public/photos/logo-web.jpg" style="width:200px; margin-bottom:16px;"/>
  </div>
  <div class="error-msg" id="error-msg"></div>
  <label>Adresse courriel</label>
  <input type="email" id="email" placeholder="votre@email.com"/>
  <label>Mot de passe</label>
  <input type="password" id="password" placeholder="&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;"
    onkeydown="if(event.key==='Enter') login()"/>
  <div class="toggle-pwd" onclick="togglePwd()">
    <svg id="eye-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
    </svg>
    <span id="eye-text">Afficher le mot de passe</span>
  </div>
  <button class="btn" id="login-btn" onclick="login()">Se connecter</button>
  <div class="loading" id="loading">Connexion en cours...</div>
  <div class="footer-note">GEQ &ndash; B&acirc;timent Conseil &copy; 2026</div>
</div>
<script>
  var SUPABASE_URL = 'https://mosgioiumzsewbzsydeh.supabase.co';
  var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1vc2dpb2l1bXpzZXdienN5ZGVoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzOTQyMjQsImV4cCI6MjA5MDk3MDIyNH0.2MjvabJetdj1b73FcPglFrzfTnaqdCGjg0Gu5Qe_aEI';

  var db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  function togglePwd(){
    var p=document.getElementById('password');
    var isHidden=p.type==='password';
    p.type=isHidden?'text':'password';
    document.getElementById('eye-text').textContent=isHidden?'Masquer le mot de passe':'Afficher le mot de passe';
  }

  async function login() {
    var email = document.getElementById('email').value.trim();
    var password = document.getElementById('password').value;
    var btn = document.getElementById('login-btn');
    var loading = document.getElementById('loading');
    document.getElementById('error-msg').style.display = 'none';
    if (!email || !password) { showError('Veuillez entrer votre courriel et mot de passe.'); return; }
    btn.disabled = true;
    loading.style.display = 'block';
    var result = await db.auth.signInWithPassword({ email: email, password: password });
    if (result.error) {
      showError('Courriel ou mot de passe incorrect.');
      btn.disabled = false;
      loading.style.display = 'none';
      return;
    }
    window.location.href = 'dashboard.html';
  }

  function showError(msg) {
    var el = document.getElementById('error-msg');
    el.textContent = msg; el.style.display = 'block';
  }

  db.auth.getSession().then(function(res) {
    if (res.data.session) window.location.href = 'dashboard.html';
  });
</script>
</body>
</html>
