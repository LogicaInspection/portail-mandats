<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portail Mandats</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: #f0f2f5;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card {
    background: white;
    border-radius: 16px;
    padding: 48px 40px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    text-align: center;
  }
  .logos {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    margin-bottom: 32px;
  }
  .logos img { height: 52px; object-fit: contain; }
  .divider { width: 1px; height: 40px; background: #e0e0e0; }
  h1 { font-size: 22px; font-weight: 600; color: #1a1a2e; margin-bottom: 8px; }
  p { color: #666; font-size: 14px; margin-bottom: 32px; }
  .btn-google {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    width: 100%;
    padding: 14px 20px;
    border: 1.5px solid #e0e0e0;
    border-radius: 10px;
    background: white;
    font-size: 15px;
    font-weight: 500;
    color: #333;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-google:hover { background: #f8f8f8; border-color: #ccc; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  .btn-google img { width: 20px; height: 20px; }
  .error {
    margin-top: 20px;
    padding: 12px 16px;
    background: #fff0f0;
    border: 1px solid #ffcccc;
    border-radius: 8px;
    color: #cc0000;
    font-size: 13px;
    display: none;
  }
  .loading {
    margin-top: 20px;
    color: #888;
    font-size: 13px;
    display: none;
  }
</style>
</head>
<body>

<div class="card">
  <div class="logos">
    <img src="https://mosgioiumzsewbzsydeh.supabase.co/storage/v1/object/public/photos/logo-web.jpg" alt="GEQ">
    <div class="divider"></div>
    <img src="https://mosgioiumzsewbzsydeh.supabase.co/storage/v1/object/public/photos/logo-logica.png" alt="Logica" onerror="this.style.display='none'">
  </div>
  <h1>Portail Mandats</h1>
  <p>GEQ – Bâtiment Conseil &amp; Logica Inspection</p>
  <button class="btn-google" onclick="signIn()">
    <img src="https://www.google.com/favicon.ico" alt="Google">
    Se connecter avec Google
  </button>
  <div class="error" id="error-msg"></div>
  <div class="loading" id="loading-msg">Connexion en cours...</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://mosgioiumzsewbzsydeh.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1vc2dpb2l1bXpzZXdienN5ZGVoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzOTQyMjQsImV4cCI6MjA5MDk3MDIyNH0.2MjvabJetdj1b73FcPglFrzfTnaqdCGjg0Gu5Qe_aEI';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.style.display = 'block';
  document.getElementById('loading-msg').style.display = 'none';
}

function showLoading(msg) {
  document.getElementById('loading-msg').textContent = msg;
  document.getElementById('loading-msg').style.display = 'block';
  document.getElementById('error-msg').style.display = 'none';
}

async function redirectUser(userId) {
  const { data: profile, error } = await supabase
    .from('profiles')
    .select('role, dashboard_access')
    .eq('id', userId)
    .single();

  if (error || !profile) {
    showError('Profil introuvable. Contactez votre administrateur.');
    return;
  }

  const autorisé = 
    profile.role === 'gestionnaire' ||
    profile.role === 'secretaire' ||
    (profile.role === 'technicien' && profile.dashboard_access === true);

  if (autorisé) {
    window.location.href = 'dashboard.html';
  } else {
    await supabase.auth.signOut();
    showError('Vous n\'avez pas accès à ce portail. Utilisez l\'application GEQ habituelle.');
  }
}

async function signIn() {
  showLoading('Redirection vers Google...');
  const { error } = await supabase.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.href }
  });
  if (error) showError(error.message);
}

// Vérifie si déjà connecté au chargement
(async () => {
  const { data: { session } } = await supabase.auth.getSession();
  if (session) {
    showLoading('Connexion en cours...');
    await redirectUser(session.user.id);
  }
})();
</script>
</body>
</html>
